    <!-- HARD RECOVERY: detecta chunk load errors do Vite (deploy novo +
         chunks antigos deletados pelo Vercel) ANTES do React montar.
         Quando detecta, faz nuke total (unregister SW + caches.delete) +
         reload UMA VEZ por sessao via sessionStorage flag.

         CRITICO: este script eh INLINE no HTML — fica sempre fresco quando
         o SW serve via network-first. Mesmo que o bundle JS antigo do user
         crashe, este script roda primeiro e auto-recupera. Eh a unica
         saida pra users com JS antigo no cache do SW v277 antigo. -->
    <script>
      (function () {
        function isChunkError(msg) {
          if (!msg) return false;
          var s = String(msg);
          return /Failed to fetch dynamically imported module|Loading chunk \d+ failed|Importing a module script failed|Failed to import|chunk load error/i.test(s);
        }
        async function nukeAndReload() {
          try {
            if (sessionStorage.getItem('papo_nuke_reload') === '1') return;
            sessionStorage.setItem('papo_nuke_reload', '1');
          } catch (e) { /* modo privado — pula proteção */ }
          try {
            if (navigator.serviceWorker) {
              var regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(function (r) { return r.unregister().catch(function () { return false; }); }));
            }
          } catch (e) {}
          try {
            if (typeof caches !== 'undefined') {
              var keys = await caches.keys();
              await Promise.all(keys.map(function (k) { return caches.delete(k).catch(function () { return false; }); }));
            }
          } catch (e) {}
          try { window.location.reload(); } catch (e) {}
        }
        window.addEventListener('error', function (e) {
          if (isChunkError(e && (e.message || (e.error && e.error.message)))) nukeAndReload();
        });
        window.addEventListener('unhandledrejection', function (e) {
          var reason = e && e.reason;
          var msg = reason && (reason.message || String(reason));
          if (isChunkError(msg)) nukeAndReload();
        });
      })();
    </script>

    <script>
      // ANTI-FOUC + auto-tema: aplica data-theme e .dark no <html> ANTES
      // do React montar, seguindo APENAS prefers-color-scheme do SO.
      // Sem toggle no app, sem localStorage — o user controla via Ajustes
      // do iOS/Android/macOS/Windows; o app reage em tempo real.
      (function () {
        try {
          // Limpa qualquer valor antigo de localStorage (legado de quando
          // tinha toggle manual) — garante que o SO seja a única fonte.
          try { localStorage.removeItem('theme'); } catch (e) {}
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var effective = prefersDark ? 'dark' : 'light';
          var root = document.documentElement;
          root.setAttribute('data-theme', effective);
          if (effective === 'dark') root.classList.add('dark');
          // Marca pra desligar transições durante a primeira pintura.
          root.setAttribute('data-theme-loading', '1');
          window.addEventListener('load', function () {
            requestAnimationFrame(function () {
              root.removeAttribute('data-theme-loading');
            });
          });
        } catch (e) {}
      })();
    </script>

    <!-- GOOGLE TRANSLATE WIDGET — traduz a PAGINA INTEIRA pra EN/ES sem
         depender do i18n manual. Solucao p/ raiz do problema reportado:
         o i18n manual cobre so 18% dos componentes (~21 de 114 .tsx),
         entao a maior parte da app ficava em PT quando o user trocava
         de idioma. O widget oficial do Google traduz TUDO automaticamente.

         Como funciona:
           - Container escondido (#google_translate_element) hospeda o widget.
           - Script async injeta o widget — quando carrega, dispara
             window.googleTranslateElementInit (definida abaixo).
           - JS do i18n.tsx (setLang) muda o cookie googtrans e dispara
             reload pra aplicar.

         CSS: esconde a barra de translate do Google que aparece no topo
         da pagina por padrao. Tambem oculta o tooltip de hover do Google
         que poluia o layout. -->
    <style>
      /* ─── ESCONDE A BARRA "Traduzido por Google" NO TOPO DA PAGINA ───
         O widget cria diferentes elementos em browsers/versoes
         diferentes. Cobrimos TODOS com regras agressivas pra garantir
         que NUNCA aparece a barra em cima da app. */

      /* Barra principal — versoes antigas e novas */
      .goog-te-banner-frame,
      .goog-te-banner-frame.skiptranslate,
      iframe.skiptranslate,
      iframe.goog-te-banner-frame,
      iframe[id^="goog-gt-"],
      iframe[src*="translate.google"],
      iframe[name="goog-te-banner"],
      .goog-te-banner,
      .goog-te-ftab,
      .goog-te-gadget-icon,
      .goog-te-balloon-frame,
      #goog-gt-tt,
      .goog-gt-tt,
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf,
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf-ti6hGc,
      .VIpgJd-ZVi9od-l4eHX-hSRGPd,
      .VIpgJd-ZVi9od-ORHb-OEVmcd { display: none !important; visibility: hidden !important; height: 0 !important; }

      /* Body — anula o margin-top:40px que o widget injeta pra abrir
         espaco pra barra. CRITICO: usar !important + cobre top E margin-top */
      html { margin-top: 0 !important; top: 0 !important; }
      body {
        top: 0 !important;
        margin-top: 0 !important;
        position: static !important;
      }
      body.translated-ltr,
      body.translated-rtl {
        top: 0 !important;
        margin-top: 0 !important;
      }

      /* Tooltip flutuante de hover (passa o mouse sobre texto traduzido) */
      .goog-tooltip,
      .goog-tooltip:hover,
      .goog-text-highlight { display: none !important; background: none !important; box-shadow: none !important; }

      /* Container do widget escondido — controlamos via cookie googtrans */
      #google_translate_element { position: fixed; left: -9999px; top: -9999px; opacity: 0; pointer-events: none; }

      /* Logo e ícones do Google que podem aparecer inline em texto traduzido */
      img.goog-te-gadget-icon { display: none !important; }
    </style>
    <script>
      // BACKUP em JS — alguns browsers iOS ignoram alguns seletores CSS
      // pro iframe da barra. MutationObserver garante que se a barra for
      // injetada DEPOIS, e detectada e removida imediatamente.
      (function () {
        function nukeTranslateBar() {
          try {
            // Remove iframes da barra
            var iframes = document.querySelectorAll(
              '.goog-te-banner-frame, iframe.skiptranslate, iframe[src*="translate.google"]'
            );
            iframes.forEach(function (el) { try { el.remove(); } catch (e) { el.style.display = 'none'; } });
            // Anula o top: 40px que o widget injeta no <body>
            if (document.body) {
              document.body.style.top = '0';
              document.body.style.marginTop = '0';
              document.body.style.position = 'static';
            }
            if (document.documentElement) {
              document.documentElement.style.marginTop = '0';
              document.documentElement.style.top = '0';
            }
          } catch (e) {}
        }
        // Roda na carga + a cada mutacao da DOM (cobre injecao tardia)
        if (document.readyState !== 'loading') nukeTranslateBar();
        else document.addEventListener('DOMContentLoaded', nukeTranslateBar);
        // Observer pra capturar a barra quando o widget tenta injetar dnv
        if (typeof MutationObserver !== 'undefined') {
          var obs = new MutationObserver(function () { nukeTranslateBar(); });
          if (document.body) obs.observe(document.body, { childList: true, subtree: false });
          else document.addEventListener('DOMContentLoaded', function () {
            obs.observe(document.body, { childList: true, subtree: false });
          });
        }
      })();
    </script>
    <div id="google_translate_element"></div>
    <script>
      // Inicializador do widget. Roda quando o script do Google carrega.
      // pageLanguage='pt' — idioma original do site. includedLanguages
      // limita o dropdown interno pra economizar memoria.
      window.googleTranslateElementInit = function () {
        try {
          new google.translate.TranslateElement(
            { pageLanguage: 'pt', includedLanguages: 'en,es,pt', autoDisplay: false, layout: 0 },
            'google_translate_element'
          );
        } catch (e) { console.warn('[gtranslate] init failed', e); }
      };
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>

    <script type="module" src="/src/main.tsx"></script>
