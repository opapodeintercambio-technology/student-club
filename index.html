    <script>
      // ANTI-FOUC + auto-tema: aplica data-theme e .dark no <html> ANTES
      // do React montar, seguindo APENAS prefers-color-scheme do SO.
      // Sem toggle no app, sem localStorage — o user controla via Ajustes
      // do iOS/Android/macOS/Windows; o app reage em tempo real.
      (function () {
        try {
          // Limpa qualquer valor antigo de localStorage (legado de quando
          // tinha toggle manual) — garante que o SO seja a única fonte.
          try { localStorage.removeItem('theme'); } catch (e) {}
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var effective = prefersDark ? 'dark' : 'light';
          var root = document.documentElement;
          root.setAttribute('data-theme', effective);
          if (effective === 'dark') root.classList.add('dark');
          // Marca pra desligar transições durante a primeira pintura.
          root.setAttribute('data-theme-loading', '1');
          window.addEventListener('load', function () {
            requestAnimationFrame(function () {
              root.removeAttribute('data-theme-loading');
            });
          });
        } catch (e) {}
      })();
    </script>
