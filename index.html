    <meta name="theme-color" content="#1f2937" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <script>
      // ANTI-FOUC: lê localStorage 'theme' e aplica data-theme + .dark no
      // <html> ANTES do React montar. Suporta 3 estados: 'light', 'dark',
      // 'system' (default — segue prefers-color-scheme do SO).
      (function () {
        try {
          var stored = null;
          try { stored = localStorage.getItem('theme'); } catch (e) {}
          var theme = (stored === 'light' || stored === 'dark') ? stored : 'system';
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var effective = theme === 'system' ? (prefersDark ? 'dark' : 'light') : theme;
          var root = document.documentElement;
          root.setAttribute('data-theme', effective);
          if (effective === 'dark') root.classList.add('dark');
          // Marca pra desligar transições durante a primeira pintura.
          root.setAttribute('data-theme-loading', '1');
          window.addEventListener('load', function () {
            // Tira a marca depois de 1 frame — transições passam a valer
            // só nas trocas iniciadas pelo user.
            requestAnimationFrame(function () {
              root.removeAttribute('data-theme-loading');
            });
          });
        } catch (e) {}
      })();
    </script>
